services:
  mysql:
    image: mysql:8.4
    container_name: smart-choice-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_choice}
      MYSQL_USER: ${MYSQL_USER:-smart_choice}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smart_choice_dev}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - smart_choice_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: smart-choice-minio
    profiles:
      - minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - smart_choice_minio_data:/data

volumes:
  smart_choice_mysql_data:
  smart_choice_minio_data:
